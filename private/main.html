<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hello world</h1>
    <input type="button" value="Sair" id="logout" onclick="logout()">

    <script>
        function logout() {
            fetch("/logout", {
                method: "GET"
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert("exit com sucesso");
                    window.location.href = data.Location;
                }
            })
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
