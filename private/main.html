<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/nav.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h1 id="forca">100%</h1>
        </div>
        
        <div class="menu">
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Perfil</a></li>
                <li><a href="#">Configurações</a></li>
            </ul>
        </div>

        <div class="logout">
            <button id="logout" onclick="logout()"> Sair</button> 
        </div>
    </nav>  
    
    <script>
        function logout() {
            fetch("/logout", {
                method: "GET"
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert("exit com sucesso");
                    window.location.href = data.Location;
                }
            })
            .catch(err => console.error(err));
        }

        function contador(){
            const elem = document.getElementById("forca");
            let i = 0;
            elem.innerText = "0%";
            elem.style.color = "#fff";

            const timer = setInterval(() => {
                if (i >= 100) {
                    clearInterval(timer);
                    return;
                }

                i++;
                elem.innerText = i + "%";

                if (i >= 90) {
                    elem.style.color = "#c62828";
                } else if (i >= 70) {
                    elem.style.color = "#ef6c00";
                } else {
                    elem.style.color = "#fff";
                }
            }, 200);
        }

        contador();
    </script>
</body>
</html>
